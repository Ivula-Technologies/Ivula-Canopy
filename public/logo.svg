<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 190 56" fill="none">
  <defs>
    <linearGradient id="ivGrad" x1="14" y1="2" x2="46" y2="52" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#27B6E8"/>
      <stop offset="100%" stop-color="#21C7F0"/>
    </linearGradient>
  </defs>

  <!-- Icon: stylized "iv" mark -->
  <g fill="url(#ivGrad)">
    <!-- dot of the i -->
    <circle cx="22" cy="6" r="5"/>
    <!-- left stroke: i-stem forming an upward chevron then down arrow -->
    <path d="M18 15 h8 v20 l6 6 l-6 6 l-10 -10 l-8 8 l14 -16 v-14 z"/>
    <!-- right stroke: lightning/arrow descending to the right -->
    <path d="M38 16 l6 0 l-12 12 l5 0 l-11 13 l3 -10 l-4 0 z"/>
  </g>

  <!-- Wordmark -->
  <text x="58" y="33" font-family="'Inter','Helvetica Neue',Arial,sans-serif" font-weight="700" font-size="26" fill="#16224A" letter-spacing="-0.3">Ivula</text>
  <text x="59" y="48" font-family="'Inter','Helvetica Neue',Arial,sans-serif" font-weight="400" font-size="10" fill="#7A8190" letter-spacing="5">TECH</text>
</svg>
