<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 48" fill="none">
  <!-- Icon: the "i" with lightning bolt -->
  <g>
    <!-- dot on top of i -->
    <circle cx="20" cy="6" r="5" fill="url(#cyanGrad)"/>
    <!-- i stem top half -->
    <rect x="16" y="13" width="8" height="10" rx="1" fill="url(#cyanGrad)"/>
    <!-- lightning bolt diagonal slash -->
    <polygon points="24,18 14,30 20,30 16,42 28,26 22,26" fill="url(#cyanGrad)"/>
  </g>
  <!-- Wordmark: Ivula -->
  <text x="42" y="28" font-family="system-ui,-apple-system,BlinkMacSystemFont,sans-serif" font-weight="800" font-size="22" fill="#1B2559" letter-spacing="-0.5">Ivula</text>
  <!-- Wordmark: TECH -->
  <text x="43" y="42" font-family="system-ui,-apple-system,BlinkMacSystemFont,sans-serif" font-weight="500" font-size="9" fill="#9CA3AF" letter-spacing="3.5">TECH</text>
  <defs>
    <linearGradient id="cyanGrad" x1="10" y1="4" x2="28" y2="44" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#00D4FF"/>
      <stop offset="100%" stop-color="#0099DD"/>
    </linearGradient>
  </defs>
</svg>
